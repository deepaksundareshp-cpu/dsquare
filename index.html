<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Secret in the Stars</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <div id="nebula"></div>
    <div id="star-field"></div>
    <div id="cursor-particle-container"></div>
    
    <div id="paper-left" class="paper-half"></div>
    <div id="paper-right" class="paper-half"></div>
    
    <div id="envelope-overlay" class="white-overlay">
        <div id="envelope-icon">✉️</div>
        <p class="instruction">Uncover the secret...</p>
    </div>

    <div id="echo-container" class="hidden">
        <div id="reveal-area"></div> 
        <div id="button-group" class="hidden">
            <button id="yes-btn" class="btn yes">YES 💕</button>
            <button id="no-btn" class="btn no">NO </button>
        </div>
    </div>

    <div id="final-yes" class="content-box hidden">
        <h1 class="message">The stars aligned. See you soon ☕</h1>
    </div>

    <audio id="bg-music" loop><source src="song.mp3" type="audio/mpeg"></audio>
    <script src="script.js"></script>
</body>
</html>
