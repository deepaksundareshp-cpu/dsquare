<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Celestial Invitation...</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <div id="star-field"></div>
    <div class="shooting-star" style="top: 10%; right: 10%; animation-delay: 0s;"></div>
    <div class="shooting-star" style="top: 25%; left: 10%; animation-delay: 1.5s;"></div>
    <div class="shooting-star" style="bottom: 15%; right: 20%; animation-delay: 3s;"></div>
    <div class="shooting-star" style="top: 50%; right: -10%; animation-delay: 2.2s;"></div>

    <div id="envelope" class="overlay">
        <div class="heart-seal">❤️</div>
        <p class="instruction">Click the heart to open your note...</p>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
    </audio>

    <div id="main-card" class="content-box hidden">
        <div class="message" id="typed-text"></div>
        <div id="button-group" class="hidden">
            <button id="yes-btn" class="btn yes">YES 💕</button>
            <button id="no-btn" class="btn no">NO 🙈</button>
        </div>
    </div>

    <div id="final-yes" class="content-box hidden">
        <h1 class="message" style="font-size: 3rem;">Yay! I can't wait! 🥰💖</h1>
        <p>I'll reach out soon to plan it.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
