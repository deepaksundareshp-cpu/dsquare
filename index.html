<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Celestial Invitation...</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

    <div id="stars-container">
        <div id="stars"></div>
        <div id="stars2"></div>
        <div id="stars3"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
        <div class="shooting_star"></div>
    </div>

    <div id="envelope-overlay" class="overlay">
        <div class="envelope-content">
            <div class="heart-seal">❤️</div>
            <p class="click-instruction">Click the heart to see my note...</p>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="https://pixabay.com/music/beats-soft-dreams-lofi-vibes-216576/" type="audio/mpeg">
    </audio>

    <div class="floating-container hidden" id="main-section">
        <div class="content-box">
            <h1 class="message typewriter" id="typed-text">Will you go for coffee with me? ☕❤️</h1>
            
            <div class="buttons-wrapper">
                <button id="yes-btn" class="btn bounce">YES </button>
                <button id="no-btn" class="btn no-bounce">NO </button>
            </div>
        </div>
    </div>

    <div id="yes-content" class="floating-container hidden text-center">
        <h1 class="message">Yay! I can't wait! 🥰💖</h1>
        <p class="sub-message">I'll text you to figure out the details.</p>
        <div class="hearts">❤️❤️❤️❤️❤️</div>
    </div>

    <div id="no-content" class="floating-container hidden text-center">
        <h1 class="message">Ouch... my heart! 💔🥺</h1>
        <p class="sub-message">That's okay, maybe next time!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
