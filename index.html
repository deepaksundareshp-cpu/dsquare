<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Celestial Invitation...</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>

    <div id="envelope-overlay" class="white-overlay">
        <div id="envelope-icon" class="envelope-icon">✉️</div>
        <p class="tear-instruction">click the envolpe to see the note...</p>
    </div>

    <div id="star-field"></div>
    
    <audio id="bg-music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div id="main-card" class="content-box hidden">
        <div id="typed-text" class="message"></div>
        <div id="button-group" class="hidden">
            <button id="yes-btn" class="btn yes">YES 💕</button>
            <button id="no-btn" class="btn no">NO 🙈</button>
        </div>
    </div>

    <div id="final-yes" class="content-box hidden">
        <h1 class="message" style="font-size: 3rem; color: #fff;">Yay! I can't wait! 🥰💖</h1>
        <p style="font-size: 1.5rem; color: #cecece;">I'll reach out soon to plan it.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
