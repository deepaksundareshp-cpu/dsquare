<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Celestial Invitation...</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
    <div id="nebula"></div>
    <div id="star-field"></div>
    <div id="cursor-particle-container"></div>
    
    <div id="start-screen" class="white-overlay">
        <button id="start-btn" class="btn-start">Begin the Experience</button>
    </div>

    <audio id="bg-music" loop><source src="song.mp3" type="audio/mpeg"></audio>

    <div id="main-card" class="content-box hidden">
        <div id="typed-text" class="message"></div>
    </div>

    <div id="final-yes" class="content-box hidden">
        <h1 class="message" style="font-size: 3.5rem; color: #fff;">Yay! I can't wait! ☕</h1>
    </div>

    <script src="script.js"></script>
</body>
</html>
