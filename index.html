<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Small Note...</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="journal-container">

    <h1 class="title">A Small Note</h1>

    <p id="typed-text" class="journal-text"></p>

    <div class="coffee-section fade-in" id="coffee-section">
        <h2 class="coffee-question">So... coffee? ☕</h2>

        <div class="buttons">
            <button id="yes-btn" class="btn primary">Yes</button>
            <button id="no-btn" class="btn secondary">No</button>
        </div>
    </div>

    <div id="yes-content" class="response hidden">
        <h2>I'd really like that.</h2>
        <p>I'll reach out and we can plan it.</p>
    </div>

    <div id="no-content" class="response hidden">
        <h2>That's okay.</h2>
        <p>Still, thank you for reading this.</p>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
